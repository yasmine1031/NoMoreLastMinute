<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>No More Last Minute - Auth Only</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        :root {
            --g2-blur: blur(20px);
            --apple-blue: #007AFF;
        }

        .icloud-nav {
            height: 60px; 
            display: flex;
            align-items: center;
            background: rgba(10, 10, 10, 0.6);
            backdrop-filter: var(--g2-blur);
            -webkit-backdrop-filter: var(--g2-blur);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .welcome-title {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 30px;
            letter-spacing: -0.5px;
        }
    </style>
</head>
